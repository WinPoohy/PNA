<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Дизайн-услуги МГТУ</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <script type="importmap">
        {
            "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <header class="bmstu-header">
        <div class="header-left">
            <a href="index.html" class="logo-link">
                <img src="assets/bmstu-logo.png" class="crest-mini" alt="Герб МГТУ">
            </a>
        </div>

        <div class="header-right">
            <div class="header-item">
                <img src="assets/clock.png" class="h-icon">
                <span>6 | зн</span>
            </div>
            <a href="https://eu.bmstu.ru/portal4/cookie/login?back=https://eu.bmstu.ru/"  class="header-link">
                <span>Войти </span>
            </a>

            <div class="header-item">
                <img src="assets/menu.png" class="h-icon">
            </div>
        </div>
    </header>

    <div id="root" class="container mt-5"></div>

    <!-- Bootstrap JS + Popper (обязательно для Информеров) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Главный скрипт как модуль -->
    <script src="./design-app.js" type="module"></script>
</body>
</html>
